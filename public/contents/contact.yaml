CONTACT:
  - TITLE: Contact
    TEXT: |
      우리 Coin Lab에서는 학부연구생, 인턴, 석사, 박사 등 다양한 레벨의 학생들을 적극적으로 찾고 있습니다. 
      우리 연구실에서는 AI를 위한 networking, networking을 위한 AI를 연구하고자 하는 열정이 넘치는 학생들을 환영합니다. 
      관심 있으신 분들은 아래 이메일로 자유롭게 연락 주시기 바랍니다. 

      - E-mail: leehw@konkuk.ac.kr

