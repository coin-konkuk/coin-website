  - TITLE: Lab Goal
    TEXT: |
      우리는 네트워크 최적화 이론과 인공지능 이론을 융합하여 Connected Intelligence와 6G Systems를 달성하는 것을 목표로 연구하고 있습니다. 
      최근에는 환경 적응적 멀티모발 병합 기법을 기반으로 원격 모니터링 시스템을 구축하며 계산 경로 탐색 알고리즘을 개발해 AoI System을 구축하는 연구를 진행하고 있습니다. 
      또한, Knowledge Distillation, Adversarial Attack 및 VLM 기반 프롬프트 튜닝 같은 인공지능 이론 연구도 활발하게 진행하고 있습니다. 
      
  - TITLE: Desired Quality
    TEXT: |
      우리 Coin Lab에서는 다음과 같은 자질을 갖춘 학생들을 찾고 있습니다. 
      - 네트워크 프로그래밍, 최적화 이론, 인공지능 이론에 대한 깊은 관심
      - 여름/겨울 방학 포함 1년 이상 지속적으로 연구 수행 가능 (필수)
      - 문제 정의 및 새로운 해결 방법 탐색을 위한 의지

      우대사항
      - 컴퓨터 네트워크 개념에 대한 이해 및 네트워크 프로그래밍 경험
      - 인공지능 관련 수업, 프로젝트, 연구 등의 경험
      - 수학적 분석, 알고리즘 설계 또는 네트워크 시스템 구현에 대한 열정
      - 특히 Python에 능숙한 학생