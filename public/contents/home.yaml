HOME:
  - TITLE: About us
    TEXT: |
      우리는 네트워크 최적화 이론과 인공지능 이론을 융합하여 Connected Intelligence와 6G Systems를 달성하는 것을 목표로 연구하고 있습니다. 

      최근에는 환경 적응적 멀티모발 병합 기법을 기반으로 원격 모니터링 시스템을 구축하며 계산 경로 탐색 알고리즘을 개발해 AoI System을 구축하는 연구를 진행하고 있습니다. 
      
      또한, Knowledge Distillation, Adversarial Attack 및 VLM 기반 프롬프트 튜닝 같은 인공지능 이론 연구도 활발하게 진행하고 있습니다. 

      [join us](http://coin.konkuk.ac.kr/contact)
