<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var path = window.location.pathname;
      var isGithubIo = /\.github\.io$/i.test(window.location.hostname);
      var repo = "";
      if (isGithubIo) {
        repo = "/" + path.split("/").filter(Boolean)[0]; // /coin-website
      }
      var redirect = path.replace(repo, "");
      var newUrl =
        window.location.origin +
        repo +
        "/?redirect=" +
        encodeURIComponent(redirect);

      window.location.replace(newUrl);
    </script>
  </head>
  <body></body>
</html>
